<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" disabled>
        <div class="basicbuttons">
            <button class="btn" onclick="clearDisplay()">C</button>
            <button class="btn" onclick="appendToDisplay('/')">/</button>
            <button class="btn" onclick="appendToDisplay('*')">*</button>
            <button class="btn" onclick="deleteLast()">←</button>
            
            <button class="btn" onclick="appendToDisplay('7')">7</button>
            <button class="btn" onclick="appendToDisplay('8')">8</button>
            <button class="btn" onclick="appendToDisplay('9')">9</button>
            <button class="btn" onclick="appendToDisplay('-')">-</button>
            
            <button class="btn" onclick="appendToDisplay('4')">4</button>
            <button class="btn" onclick="appendToDisplay('5')">5</button>
            <button class="btn" onclick="appendToDisplay('6')">6</button>
            <button class="btn" onclick="appendToDisplay('+')">+</button>
            
            <button class="btn" onclick="appendToDisplay('1')">1</button>
            <button class="btn" onclick="appendToDisplay('2')">2</button>
            <button class="btn" onclick="appendToDisplay('3')">3</button>
            <button class="btn equals" onclick="calculate()" rowspan="2">=</button>
            
            <button class="btn zero" onclick="appendToDisplay('0')">0</button>
            <button class="btn" onclick="appendToDisplay('.')">.</button>
        </div>
        <div class="buttons scientific-buttons" id="scientificButtons" style="display: none;">
            <button class="btn" onclick="clearDisplay()">C</button>
            <button class="btn scientific" onclick="applySciFunction('sin')">sin</button>
            <button class="btn scientific" onclick="applySciFunction('cos')">cos</button>
            <button class="btn" onclick="deleteLast()">←</button>
            
            <button class="btn scientific" onclick="applySciFunction('tan')">tan</button>
            <button class="btn scientific" onclick="applySciFunction('sqrt')">√</button>
            <button class="btn scientific" onclick="appendToDisplay('Math.PI')">π</button>
            <button class="btn" onclick="appendToDisplay('/')">/</button>
            
            <button class="btn scientific" onclick="applySciFunction('log')">log</button>
            <button class="btn scientific" onclick="applySciFunction('ln')">ln</button>
            <button class="btn scientific" onclick="appendToDisplay('Math.E')">e</button>
            <button class="btn" onclick="appendToDisplay('*')">*</button>
            
            <button class="btn" onclick="appendToDisplay('1')">1</button>
            <button class="btn" onclick="appendToDisplay('2')">2</button>
            <button class="btn" onclick="appendToDisplay('3')">3</button>
            <button class="btn" onclick="appendToDisplay('-')">-</button>
            
            <button class="btn" onclick="appendToDisplay('0')">0</button>
            <button class="btn" onclick="appendToDisplay('.')">.</button>
            <button class="btn scientific" onclick="applySciFunction('factorial')">n!</button>
            <button class="btn equals" onclick="calculate()">+</button>
        </div>
        <div class="buttons scientific-buttons" id="scientificButtons" style="display: none;">
            <button class="btn" onclick="clearDisplay()">C</button>
            <button class="btn scientific" onclick="applySciFunction('sin')">sin</button>
            <button class="btn scientific" onclick="applySciFunction('cos')">cos</button>
            <button class="btn" onclick="deleteLast()">←</button>
            
            <button class="btn scientific" onclick="applySciFunction('tan')">tan</button>
            <button class="btn scientific" onclick="applySciFunction('sqrt')">√</button>
            <button class="btn scientific" onclick="appendToDisplay('Math.PI')">π</button>
            <button class="btn" onclick="appendToDisplay('/')">/</button>
            
            <button class="btn scientific" onclick="applySciFunction('log')">log</button>
            <button class="btn scientific" onclick="applySciFunction('ln')">ln</button>
            <button class="btn scientific" onclick="appendToDisplay('Math.E')">e</button>
            <button class="btn" onclick="appendToDisplay('*')">*</button>
            
            <button class="btn" onclick="appendToDisplay('1')">1</button>
            <button class="btn" onclick="appendToDisplay('2')">2</button>
            <button class="btn" onclick="appendToDisplay('3')">3</button>
            <button class="btn" onclick="appendToDisplay('-')">-</button>
            
            <button class="btn" onclick="appendToDisplay('0')">0</button>
            <button class="btn" onclick="appendToDisplay('.')">.</button>
            <button class="btn scientific" onclick="applySciFunction('factorial')">n!</button>
            <button class="btn equals" onclick="calculate()">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
